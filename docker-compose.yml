version: "3.9"

services:
  mock-llm:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: python tools/mock_llm.py
    ports:
      - "8001:8001"

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MOCK_LLM_URL=http://mock-llm:8001/v1/chat/completions
      - UPSTREAM_TIMEOUT_SECONDS=10
    ports:
      - "8000:8000"
    depends_on:
      - mock-llm

