services:
  mock-llm:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m uvicorn tools.mock_llm:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MOCK_LLM_URL=http://mock-llm:8001/v1/chat/completions
      - UPSTREAM_TIMEOUT_SECONDS=10
    ports:
      - "8000:8000"
    depends_on:
      - mock-llm
